<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clima Hoje</title>
    <!-- Favicon da aba -->
    <link rel="icon" href="https://img.icons8.com/fluency/48/cloud.png" type="image/png">
    <link rel="stylesheet" href="estilos.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

            

    <main class="app-container">

        


        <section class="">
            <h1>
                <img src="https://img.icons8.com/fluency/48/cloud.png" alt="Nuvem" class="title-icon"> 
                Clima Hoje
            </h1>
            
            
            <div class="search-box">
                <input type="text" id="cidade" list="sugestoes" placeholder="Busque uma cidade brasileira..." autocomplete="off">
                <datalist id="sugestoes"></datalist>
                
                <button id="buscar">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </button>
            </div>
        </section>

        <section>
            <div class="background-overlay"></div>
        <div class="clock-container">
        <div id="clock">00:00:00</div></div>
        </section>

        
    
</script>
        

        <section id="resultado" class="weather-card">
            <div class="current-weather">
                <h2 id="nome-cidade">Brasil</h2>
                <p class="temp-principal" id="display-temp">--°C</p>
                <p class="desc-clima" id="desc-clima">Digite uma cidade para começar</p>
            </div>

            <div class="details-grid">
                <div class="detail-item">
                    <span>Velocidade do Vento</span>
                    <strong id="vento">-- km/h</strong>
                </div>
                <div class="detail-item">
                    <span>Sensação Térmica</span>
                    <strong id="sensacao">--</strong>
                </div>
            </div>

            <hr class="divider">
            <h3 class="forecast-title">Previsão Próximos Dias</h3>
            <div class="forecast-container" id="previsao">
                <!-- Injetado via JS -->
            </div>
        </section>

        

    </main>

    <script src="logica.js"></script>
</body>
</html>
